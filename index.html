<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="基金十大重仓股票对比工具 — 多列对比、颜色标记、共同持仓筛选">
  <meta name="theme-color" content="#2E5C8A">
  <title>基金重仓对比</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234A90D9'/><text x='50' y='68' text-anchor='middle' font-size='50'>📊</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- ========== 页面头部 ========== -->
  <header class="app-header">
    <h1 class="app-title">基金十大重仓对比</h1>
  </header>

  <!-- ========== 工具栏 ========== -->
  <div class="toolbar">
    <div class="toolbar-left">
      <!-- 搜索框 -->
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="搜索基金名称或股票...">
      </div>
      <!-- 筛选开关 -->
      <label class="filter-toggle">
        <input type="checkbox" class="filter-checkbox">
        <span class="filter-label">只看共同持仓</span>
      </label>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-primary" id="btn-add-fund">+ 添加基金</button>
    </div>
  </div>

  <!-- ========== 基金卡片容器（JS 动态渲染） ========== -->
  <main class="fund-grid"></main>

  <!-- ========== 添加基金弹窗 ========== -->
  <div class="modal-overlay" id="modal-add" style="display:none">
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 class="modal-title">添加基金</h2>
        <button class="btn-icon modal-close" title="关闭">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">基金名称 <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="例如：易方达蓝筹精选" maxlength="50">
        </div>
        <div class="form-group">
          <label class="form-label">十大重仓股票</label>
          <p class="form-hint">按持仓顺序填写，至少输入 1 只</p>
          <div class="stock-inputs">
            <div class="stock-input-row"><span class="stock-rank">1</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
            <div class="stock-input-row"><span class="stock-rank">2</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
            <div class="stock-input-row"><span class="stock-rank">3</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
            <div class="stock-input-row"><span class="stock-rank">4</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
            <div class="stock-input-row"><span class="stock-rank">5</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
            <div class="stock-input-row"><span class="stock-rank">6</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
            <div class="stock-input-row"><span class="stock-rank">7</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
            <div class="stock-input-row"><span class="stock-rank">8</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
            <div class="stock-input-row"><span class="stock-rank">9</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
            <div class="stock-input-row"><span class="stock-rank">10</span><input type="text" class="form-input stock-input" placeholder="股票名称" maxlength="20"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel">取消</button>
        <button class="btn btn-primary">确认添加</button>
      </div>
    </div>
  </div>

  <!-- ========== 删除确认弹窗 ========== -->
  <div class="modal-overlay" id="modal-delete" style="display:none">
    <div class="modal-dialog modal-sm">
      <div class="modal-header">
        <h2 class="modal-title">确认删除</h2>
      </div>
      <div class="modal-body">
        <p class="delete-message">确定要删除基金 "<strong class="delete-fund-name"></strong>" 吗？</p>
        <p class="delete-warning">删除后数据不可恢复</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel">取消</button>
        <button class="btn btn-danger">确认删除</button>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/color.js"></script>
  <script src="js/filter.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
